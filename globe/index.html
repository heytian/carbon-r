<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OCO-3 CO&#x2082; City Explorer</title>
<style>
:root{
  --bg:#050505;--bg2:#080808;--bg3:#111;
  --b1:#181818;--b2:#222;--b3:#333;
  --t1:#f2f2f2;--t2:#bbb;--t3:#777;
  --accent:#00f5ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--t1);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:13px}
body{display:flex}

/* ── Sidebar ─────────────────────────────────────────────── */
.sb{width:248px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 16px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-head h1{font-size:12px;font-weight:700;color:#fff;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.sb-head p{font-size:9px;color:var(--t3);letter-spacing:.08em}
/* City list */
.city-list{overflow-y:auto;max-height:260px;margin-top:6px}
.city-list::-webkit-scrollbar{width:3px}
.city-list::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
.city-item{display:flex;align-items:center;gap:8px;padding:5px 4px 5px 2px;
  border-radius:3px;cursor:pointer;transition:background .1s;user-select:none}
.city-item:hover{background:#111}
.city-item.sel{background:#0b1520}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid #333;transition:all .15s}
.ci-text{flex:1;min-width:0}
.ci-name{font-size:11px;color:var(--t2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-item.sel .ci-name{font-weight:600}
.ci-country{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-co2{font-size:9px;color:#555;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums}
.city-list-empty{font-size:10px;color:var(--t3);padding:8px 4px;text-align:center}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}
.sb-sec{padding:10px 16px 9px;border-bottom:1px solid #0c0c0c}
.sb-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.sb-lbl-hint{font-size:8px;color:#2a2a2a;text-transform:none;letter-spacing:.04em}
.chips{display:flex;flex-wrap:wrap;gap:4px;min-height:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 8px;
  border-radius:20px;border:1px solid;font-size:10px;cursor:default;user-select:none;
  white-space:nowrap;max-width:120px}
.chip span{overflow:hidden;text-overflow:ellipsis}
.chip-x{opacity:.5;cursor:pointer;font-size:10px;padding:0 1px;flex-shrink:0}
.chip-x:hover{opacity:1}
.sb-search-wrap{margin-top:8px;position:relative}
.sb-inp{width:100%;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  padding:5px 9px;font-size:11px;border-radius:4px;outline:none;font-family:inherit}
.sb-inp::placeholder{color:#333}
.sb-inp:focus{border-color:var(--b3)}
.ac{position:absolute;left:0;right:0;top:calc(100% + 2px);background:var(--bg3);
  border:1px solid var(--b2);border-radius:4px;max-height:154px;overflow-y:auto;z-index:200;display:none}
.ac.open{display:block}
.ac-it{padding:5px 10px;font-size:11px;cursor:pointer;color:var(--t2)}
.ac-it:hover{background:var(--b1);color:var(--t1)}
.ac-it.nm{color:var(--t3);cursor:default}
.yr-row{display:flex;align-items:center;gap:6px}
.yr-sel{flex:1;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  padding:4px 6px;font-size:11px;border-radius:3px;outline:none;cursor:pointer;font-family:inherit}
.yr-sel:focus{border-color:var(--b3)}
.yr-dash{color:var(--t3);font-size:11px;flex-shrink:0}
.months-hint{font-size:9px;color:var(--t3);margin-top:5px}
.view-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.vb{padding:5px 0;background:var(--bg3);border:1px solid var(--b2);color:var(--t3);
  border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;text-align:center;
  letter-spacing:.04em;transition:all .12s}
.vb:hover{color:var(--t2);border-color:var(--b3)}
.vb.on{color:var(--accent);border-color:var(--accent)44;background:#061518}
.sb-foot{padding:10px 16px 14px;border-top:1px solid var(--b1);flex-shrink:0;margin-top:auto}
.ts-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;
  background:#091209;border:1px solid #142014;border-radius:5px;text-decoration:none;
  color:#39ff14;font-size:11px;letter-spacing:.04em;margin-bottom:8px;transition:background .14s}
.ts-btn:hover{background:#0c1a0c}
.ts-btn-arr{font-size:17px;animation:bob .85s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.back-lnk{font-size:9px;color:#252525;text-decoration:none;display:block;text-align:center}
.back-lnk:hover{color:var(--t3)}

/* ── Stage ───────────────────────────────────────────────── */
.stage{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:default}
#cv{position:absolute;inset:0;width:100%;height:100%;cursor:grab;transition:opacity .18s}
#cv:active{cursor:grabbing}
#cv.fade{opacity:.25}

/* Tooltip */
#tt{position:absolute;pointer-events:none;z-index:50;display:none;
  background:#0a0a0a;border:1px solid var(--b3);border-radius:6px;
  padding:8px 12px;font-size:11px;max-width:200px;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.8)}
.tt-name{font-weight:600;color:#fff;margin-bottom:3px}
.tt-row{color:var(--t2);line-height:1.7}
.tt-row b{color:var(--t1)}

/* Nav arrows */
.nav{position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;background:rgba(6,6,6,.85);border:1px solid var(--b2);
  border-radius:50%;color:var(--t3);font-size:14px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav:hover{color:var(--t1);border-color:var(--b3)}
.nav.l{left:9px}
.nav.r{right:9px}

/* View dots */
.dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;z-index:10}
.dot{width:5px;height:5px;border-radius:50%;background:#1a1a1a;cursor:pointer;transition:background .14s}
.dot.on{background:#888}

/* View header bar */
#vhdr{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;text-align:center}
#vhdr h2{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.9)}
#vhdr p{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.05em}

/* Globe toggle */
#gtog{position:absolute;top:10px;right:11px;z-index:10;font-size:10px;padding:4px 9px;
  background:var(--bg3);border:1px solid var(--b2);color:var(--t3);border-radius:3px;
  cursor:pointer;font-family:inherit;letter-spacing:.05em;text-transform:uppercase;transition:all .12s}
#gtog:hover{color:var(--t1)}
#gtog.flat{color:var(--accent);border-color:var(--accent)44}

/* Scatter controls */
#scat-ctrl{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:10;display:none;align-items:center;gap:8px;
  background:rgba(8,8,8,.9);border:1px solid #1e1e1e;border-radius:5px;
  padding:5px 12px;white-space:nowrap}
#scat-ctrl.on{display:flex}
.sc-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.1em}
.sc-sep{color:#252525;font-size:12px}
.sc-sel{background:#0d0d0d;border:1px solid #222;color:#ccc;padding:3px 5px;
  font-size:10px;border-radius:3px;outline:none;cursor:pointer;font-family:inherit;
  max-width:160px}

/* Pulse link overlay */
#plink{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:#39ff14}
#plink:hover{opacity:.8}
#plink .pl-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase}
#plink .pl-arr{font-size:22px;animation:bob .85s ease-in-out infinite}

/* Loading */
#ldg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:#1e1e1e;pointer-events:none;z-index:5}
.ldg-sp{width:20px;height:20px;border:2px solid #141414;border-top-color:#2e2e2e;
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-head">
    <h1>CO&#x2082; City Explorer</h1>
    <p>OCO-3 SAM &#xb7; Ahn et al. 2025 supplementary</p>
  </div>
  <div class="sb-scroll">
    <div class="sb-sec">
      <div class="sb-lbl">Selected <span class="sb-lbl-hint" id="sel-count"></span></div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="sb-sec" style="flex:1;display:flex;flex-direction:column;border-bottom:none">
      <div class="sb-lbl">All Cities <span class="sb-lbl-hint">click to toggle</span></div>
      <input class="sb-inp" id="srch" type="text" placeholder="Filter cities&#x2026;" autocomplete="off" style="margin-bottom:2px">
      <div class="city-list" id="city-list"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Time Range</div>
      <div class="yr-row">
        <select class="yr-sel" id="yfrom"></select>
        <span class="yr-dash">&#x2014;</span>
        <select class="yr-sel" id="yto"></select>
      </div>
      <div class="months-hint" id="mhint"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Analysis View</div>
      <div class="view-grid" id="vgrid"></div>
    </div>
  </div>
  <div class="sb-foot">
    <a class="ts-btn" href="../timeseries/index.html">
      <span class="ts-btn-arr">&#x21e9;</span>
      <span>Full Timeseries Explorer</span>
    </a>
    <a class="back-lnk" href="../index.html">&#x2190; back to home</a>
  </div>
</aside>

<div class="stage" id="stage">
  <canvas id="cv"></canvas>
  <div id="ldg"><div class="ldg-sp"></div><span>Loading world map&#x2026;</span></div>
  <div id="tt">
    <div class="tt-name" id="tt-name"></div>
    <div id="tt-body"></div>
  </div>
  <div id="vhdr"></div>
  <button class="nav l" id="np">&#x2190;</button>
  <button class="nav r" id="nn">&#x2192;</button>
  <div class="dots" id="dots"></div>
  <button id="gtog">&#x26F6; 2D Map</button>
  <div id="scat-ctrl">
    <span class="sc-lbl">X</span>
    <select class="sc-sel" id="sc-x">
      <option value="xco2avg">Mean XCO&#x2082; (ppm)</option>
      <option value="sif">Mean SIF (W/m²/sr/nm)</option>
      <option value="gdppc">GDP per capita (USD/person)</option>
      <option value="gdp">GDP (billion USD)</option>
      <option value="pop">Population (millions)</option>
      <option value="co2emit">CO&#x2082; Emissions (MtCO&#x2082;/yr)</option>
      <option value="co2gdp">CO&#x2082;/GDP (kgCO&#x2082;/USD)</option>
    </select>
    <span class="sc-sep">&#x2014;</span>
    <span class="sc-lbl">Y</span>
    <select class="sc-sel" id="sc-y">
      <option value="sif">Mean SIF (W/m²/sr/nm)</option>
      <option value="xco2avg">Mean XCO&#x2082; (ppm)</option>
      <option value="co2gdp">CO&#x2082;/GDP (kgCO&#x2082;/USD)</option>
      <option value="co2emit">CO&#x2082; Emissions (MtCO&#x2082;/yr)</option>
      <option value="gdppc">GDP per capita (USD/person)</option>
      <option value="gdp">GDP (billion USD)</option>
      <option value="pop">Population (millions)</option>
    </select>
    <span class="sc-sep">&#x2014;</span>
    <span class="sc-lbl">Size</span>
    <select class="sc-sel" id="sc-sz">
      <option value="pop">Population</option>
      <option value="co2emit">Emissions</option>
      <option value="gdp">GDP</option>
      <option value="uniform">Uniform</option>
    </select>
    <span class="sc-sep">&#x2014;</span>
    <span class="sc-lbl">Color</span>
    <select class="sc-sel" id="sc-col">
      <option value="xco2avg">XCO&#x2082;</option>
      <option value="sif">SIF</option>
      <option value="pop">Population</option>
      <option value="co2emit">Emissions</option>
    </select>
  </div>
  <a id="plink" href="../timeseries/index.html">
    <span class="pl-lbl">Open in Timeseries Explorer</span>
    <span class="pl-arr">&#x21e9;</span>
  </a>
</div>

function scatVal(c, key, months){
  if(key==='xco2avg'){const st=cityStats(c.name);return st?st.avg:null;}
  if(key==='sif')    return getSIF(c.name, months||filtMo(c.name));
  if(key==='co2emit')return c.co2??null;
  if(key==='pop')    return c.pop??null;
  if(key==='gdp')    return c.gdp??null;
  if(key==='gdppc')  return (c.gdp&&c.pop)?c.gdp*1e9/c.pop:null;
  // co2 in MtCO2 = 1e9 kgCO2; gdp in billion USD = 1e9 USD → ratio = co2/gdp kgCO2/USD
  if(key==='co2gdp') return (c.co2&&c.gdp)?c.co2/c.gdp:null;
  return null;
}

// ── TIME HELPERS ──────────────────────────────────────────────────
function mink(){return `${S.yfrom}-01`;}
function maxk(){return `${S.yto}-12`;}
function filtMo(name){
  const mo=CO2_MONTHLY[name]; if(!mo) return [];
  const a=mink(),b=maxk();
  return Object.keys(mo).filter(m=>m>=a&&m<=b).sort();
}
function cityStats(name){
  const mo=CO2_MONTHLY[name]; if(!mo) return null;
  const keys=filtMo(name);
  if(!keys.length) return null;
  const vals=keys.map(k=>mo[k]);
  const mn=Math.min(...vals),mx=Math.max(...vals),av=vals.reduce((a,v)=>a+v,0)/vals.length;
  return{min:mn,max:mx,avg:av,n:keys.length,months:keys,vals};
}
function updateMonthsHint(){
  const allMo=new Set();
  S.sel.forEach(n=>filtMo(n).forEach(m=>allMo.add(m)));
  const n=allMo.size;
  document.getElementById("mhint").textContent=n?`${n} months of data for selected cities`:"";
}

// ── SIF (Solar-Induced Fluorescence) ─────────────────────────────
// Primary: real OCO-3 SIF data from sif_sam.csv (SIF_MONTHLY)
// Fallback: latitude-based seasonal simulation when data unavailable
function _sifSim(lat,ym){
  const mo=parseInt(ym.split("-")[1]);
  const al=Math.abs(lat);
  const base=0.12+0.28*Math.exp(-al/38);
  const amp=0.16*(1-Math.exp(-al/22));
  const pk=lat>=0?7:1;
  return Math.max(0,base+amp*Math.sin(TAU*(mo-pk)/12));
}
// getSIF(name, months) — returns mean real SIF over given months (W/m²/sr/nm)
// months: array of "YYYY-MM" strings from filtMo()
function getSIF(name, months){
  const mo=SIF_MONTHLY[name];
  if(mo){
    const keys=months&&months.length?months.filter(m=>mo[m]!==undefined):Object.keys(mo);
    if(keys.length) return keys.reduce((s,m)=>s+(mo[m]||0),0)/keys.length;
  }
  // Fallback simulation using city lat
  const c=CITY_DATA.find(x=>x.name===name);
  const lat=c?c.lat:0;
  if(!months||!months.length){let s=0;for(let m=1;m<=12;m++)s+=_sifSim(lat,"2022-"+String(m).padStart(2,"0"));return s/12;}
  return months.reduce((s,m)=>s+_sifSim(lat,m),0)/months.length;
}
// Legacy alias kept for any remaining call sites (passes lat but ignores it in favor of name lookup)
function meanSIF(lat,months,name){
  if(name) return getSIF(name,months);
  // pure simulation path (no city name available)
  if(!months||!months.length){let s=0;for(let m=1;m<=12;m++)s+=_sifSim(lat,"2022-"+String(m).padStart(2,"0"));return s/12;}
  return months.reduce((s,m)=>s+_sifSim(lat,m),0)/months.length;
}
function ha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function mkGlobe(cx,cy,sc,rlon,rlat){
  rlon=rlon??S.rot.lon; rlat=rlat??S.rot.lat;
  return d3.geoOrthographic().rotate([-rlon,-rlat,0]).clipAngle(90).scale(sc).translate([cx,cy]);
}
function mkFlat(cx,cy,sc){return d3.geoNaturalEarth1().scale(sc).translate([cx,cy]);}
function mkEq(cx,cy,sc){return d3.geoEquirectangular().scale(sc).translate([cx,cy]);}

// ── BASE GLOBE DRAWING ────────────────────────────────────────────
function drawGlobe(proj,opts={}){
  const{alpha=1,light=true}=opts;
  const path=d3.geoPath(proj,ctx);
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); path({type:"Sphere"});
  ctx.fillStyle="#060d1c"; ctx.fill();
  if(light){
    const grd=ctx.createRadialGradient(W*.5+W*.12,H*.5-H*.12,0,W*.5,H*.5,Math.min(W,H)*.42);
    grd.addColorStop(0,"rgba(30,60,120,0.18)"); grd.addColorStop(1,"rgba(0,0,0,0)");
    ctx.beginPath(); path({type:"Sphere"}); ctx.fillStyle=grd; ctx.fill();
  }
  const grat=d3.geoGraticule()();
  ctx.beginPath(); path(grat);
  ctx.strokeStyle="rgba(22,45,95,0.6)"; ctx.lineWidth=.5; ctx.stroke();
  if(land){
    ctx.beginPath(); path(land);
    ctx.fillStyle="#0d1c32"; ctx.fill();
    ctx.strokeStyle="rgba(35,70,140,0.5)"; ctx.lineWidth=.5; ctx.stroke();
  }
  ctx.beginPath(); path({type:"Sphere"});
  ctx.strokeStyle="rgba(40,80,180,0.28)"; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}
function drawFlatMap(proj){
  const path=d3.geoPath(proj,ctx);
  if(land){ctx.beginPath();path(land);ctx.fillStyle="#0d1c32";ctx.fill();
    ctx.strokeStyle="rgba(35,70,140,0.4)";ctx.lineWidth=.5;ctx.stroke();}
  const grat=d3.geoGraticule()();
  ctx.beginPath();path(grat);
  ctx.strokeStyle="rgba(14,28,58,0.55)";ctx.lineWidth=.5;ctx.stroke();
}

// ── CITY DOTS ─────────────────────────────────────────────────────
// Mean XCO2 anomaly above global background
function xco2Dev(name){
  const st=cityStats(name); return st?Math.max(0,st.avg-413):0;
}
// SIF color scale: white (low) → green (high)
// Input: SIF value in W/m²/sr/nm; returns CSS color string
function sifColor(v){
  const t=Math.max(0,Math.min(1,v/0.45));
  // white (255,255,255) → green (0,200,60)
  const r=Math.round(255*(1-t));
  const g=255;
  const b=Math.round(255*(1-t*.75));
  return`rgb(${r},${g},${b})`;
}
function sifColorAlpha(v,a){
  const t=Math.max(0,Math.min(1,v/0.45));
  const r=Math.round(255*(1-t));
  const g=255;
  const b=Math.round(255*(1-t*.75));
  return`rgba(${r},${g},${b},${a})`;
}

function drawDots(proj,opts={}){
  const{selR=6,dimR=1.5,labels=true,sizeByXco2=false}=opts;
  const mo=S.month; // null = avg, "YYYY-MM" = specific month
  // For sizing selected cities: use deviation from global mean for that month, or avg deviation
  const selXco2s=S.sel.map(n=>{
    if(mo){const v=(CO2_MONTHLY[n]||{})[mo]; return v!=null?Math.abs(v-420):0;}
    return xco2Dev(n);
  });
  const maxDev=Math.max(...selXco2s,1);

  // Background cities
  for(const c of CITY_DATA){
    if(S.sel.includes(c.name)) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const isHov=S.hover===c.name;
    if(sizeByXco2){
      // Color by SIF for current month or avg
      const sv=mo
        ?((SIF_MONTHLY[c.name]||{})[mo]??_sifSim(c.lat,mo))
        :getSIF(c.name,filtMo(c.name));
      ctx.beginPath(); ctx.arc(p[0],p[1],isHov?5:2.2,0,TAU);
      ctx.fillStyle=isHov?sifColor(sv):sifColorAlpha(sv,0.55); ctx.fill();
    } else {
      const hasMo=mo?(CO2_MONTHLY[c.name]||{})[mo]!=null:filtMo(c.name).length>0;
      ctx.beginPath(); ctx.arc(p[0],p[1],isHov?4.5:dimR,0,TAU);
      ctx.fillStyle=isHov?"rgba(200,220,255,0.65)":hasMo?"rgba(50,95,180,0.35)":"rgba(35,60,110,0.18)";
      ctx.fill();
    }
    if(isHov){
      ctx.font="10px Segoe UI,sans-serif"; ctx.fillStyle="rgba(200,220,255,0.8)";
      ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(c.name,p[0]+7,p[1]);
    }
  }
  // Selected cities on top
  for(const name of S.sel){
    const c=CITY_DATA.find(x=>x.name===name); if(!c) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const col=S.colors[name];
    const dev=mo?((CO2_MONTHLY[name]||{})[mo]!=null?Math.abs((CO2_MONTHLY[name]||{})[mo]-420):0):xco2Dev(name);
    const r=sizeByXco2?8+26*(dev/maxDev):selR;
    const sv=mo
      ?((SIF_MONTHLY[name]||{})[mo]??_sifSim(c.lat,mo))
      :getSIF(name,filtMo(name));
    const grd=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r*2.4);
    grd.addColorStop(0,ha(col,.18)); grd.addColorStop(1,ha(col,0));
    ctx.beginPath(); ctx.arc(p[0],p[1],r*2.4,0,TAU); ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath(); ctx.arc(p[0],p[1],r,0,TAU);
    ctx.fillStyle=sizeByXco2?sifColorAlpha(sv,.85):col; ctx.fill();
    if(sizeByXco2){ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();}
    if(labels&&!sizeByXco2){
      ctx.font="bold 10.5px Segoe UI,sans-serif";
      ctx.fillStyle=col; ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(c.name.split(" ")[0],p[0]+r+4,p[1]);
    }
    if(sizeByXco2){
      const co2val=mo?(CO2_MONTHLY[name]||{})[mo]:cityStats(name)?.avg;
      ctx.font="bold 11.5px Segoe UI,sans-serif"; ctx.fillStyle=col;
      ctx.textAlign="center"; ctx.textBaseline="top";
      ctx.fillText(name,p[0],p[1]+r+5);
      ctx.font="10px Segoe UI,sans-serif"; ctx.fillStyle="rgba(200,200,200,0.7)";
      const xcoLbl=co2val!=null?co2val.toFixed(1)+" ppm":"";
      const sifLbl="SIF "+sv.toFixed(2);
      ctx.fillText(xcoLbl,p[0],p[1]+r+17);
      ctx.fillStyle=sifColorAlpha(sv,0.9);
      ctx.fillText(sifLbl,p[0],p[1]+r+28);
    }
  }
}

// ── MINIMAP ───────────────────────────────────────────────────────
function drawMinimap(alpha=0.85){
  const mw=170,mh=85,mx=W-mw-10,my=10;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle="#060c18"; ctx.strokeStyle="#18283e"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.rect(mx,my,mw,mh); ctx.fill(); ctx.stroke();
  const proj=mkEq(mx+mw/2,my+mh/2,mw/6.6);
  const path=d3.geoPath(proj,ctx);
  if(land){ctx.beginPath();path(land);ctx.fillStyle="#0f1e34";ctx.fill();}
  for(const c of CITY_DATA){
    const p=proj([c.lon,c.lat]); if(!p) continue;
    if(p[0]<mx||p[0]>mx+mw||p[1]<my||p[1]>my+mh) continue;
    const isSel=S.sel.includes(c.name);
    ctx.beginPath(); ctx.arc(p[0],p[1],isSel?3:1,0,TAU);
    ctx.fillStyle=isSel?S.colors[c.name]:"rgba(45,75,135,0.45)"; ctx.fill();
  }
  ctx.restore();
}

// ── MONTH SCRUBBER (V0 / V1) ─────────────────────────────────────
// Draws a scrubber strip at the bottom of the canvas showing all months.
// Drag/click to set S.month. Click active month to clear (show averages).
const SCR={drag:false, y0:0, h:20}; // geometry cached each frame
function drawScrubber(){
  const months=getAllMonths();
  const M=months.length;
  if(!M) return;
  const pad=10, sY=H-SCR.h-4, sW=W-pad*2;
  SCR.y0=sY; SCR.x0=pad; SCR.w=sW;
  const xOf=j=>pad+j/(M-1)*sW;
  SCR.xOf=xOf; SCR.months=months;

  // Background track
  ctx.fillStyle="rgba(0,0,0,.6)";
  ctx.beginPath(); ctx.roundRect(pad-2,sY-2,sW+4,SCR.h+4,4); ctx.fill();

  // Month segments — colored by whether in current year filter
  months.forEach((m,j)=>{
    const yr=+m.slice(0,4);
    const inRange=yr>=S.yfrom&&yr<=S.yto;
    const isCur=m===S.month;
    const x=xOf(j);
    ctx.fillStyle=isCur?"#00f5ff":inRange?"rgba(0,180,220,0.28)":"rgba(60,60,60,0.3)";
    ctx.fillRect(x-1,sY+2,2,SCR.h-4);
  });

  // Year tick labels
  YEARS.forEach(y=>{
    const firstMo=months.find(m=>m.startsWith(y+"-"));
    if(!firstMo) return;
    const x=xOf(months.indexOf(firstMo));
    ctx.fillStyle="#333"; ctx.fillRect(x-.4,sY,1,SCR.h);
    ctx.fillStyle="#555"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText(y,x,sY-10);
  });

  // Active month playhead
  if(S.month){
    const j=months.indexOf(S.month);
    if(j>=0){
      const x=xOf(j);
      ctx.fillStyle="#00f5ff";
      ctx.beginPath(); ctx.roundRect(x-4,sY-1,8,SCR.h+2,2); ctx.fill();
      ctx.fillStyle="#000"; ctx.font="bold 8px Segoe UI,sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText(S.month,x,sY-12);
    }
  } else {
    // "avg" label
    ctx.fillStyle="#444"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText("Drag to scrub \u2192 showing avg",pad,sY-2);
  }
}

function scrubberHit(ex,ey){
  if(S.view>1||!SCR.months) return false;
  const rect=cv.getBoundingClientRect();
  const my=ey-rect.top;
  return my>=SCR.y0-8&&my<=SCR.y0+SCR.h+8;
}
function scrubToX(ex){
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left;
  const M=SCR.months.length;
  const j=Math.max(0,Math.min(M-1,Math.round((mx-SCR.x0)/SCR.w*(M-1))));
  const m=SCR.months[j];
  if(m===S.month){S.month=null;}else{S.month=m;}
  render();
}

// ── VIEW 2: Pulse / Interleaved ───────────────────────────────────
function drawV2(){
  ctx.clearRect(0,0,W,H);
  if(!S.sel.length){noDataMsg("Select cities to see the pulse view");return;}
  const n=S.sel.length;
  const gR=Math.min(W*.17,H*.3);
  const gCX=W*.2, gCY=H*.5;
  const sc=S.sel.map(nm=>CITY_DATA.find(c=>c.name===nm)).filter(Boolean);
  const cLon=sc.reduce((s,c)=>s+c.lon,0)/sc.length;
  const cLat=sc.reduce((s,c)=>s+c.lat,0)/sc.length;
  const proj=mkGlobe(gCX,gCY,gR,cLon,cLat);
  drawGlobe(proj,{light:false});
  for(const c of CITY_DATA){const p=proj([c.lon,c.lat]);if(!p)continue;
    ctx.beginPath();ctx.arc(p[0],p[1],1.4,0,TAU);ctx.fillStyle="rgba(35,65,125,0.28)";ctx.fill();}

  const spX0=W*.41, spX1=W*.94, spW=spX1-spX0;
  const rowH=H/(n+1);
  const allMoSet=new Set();
  S.sel.forEach(nm=>filtMo(nm).forEach(m=>allMoSet.add(m)));
  const allMo=Array.from(allMoSet).sort();
  if(!allMo.length){noDataMsg("No data in selected time range");return;}

  S.sel.forEach((name,i)=>{
    const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
    const col=S.colors[name];
    const rowY=rowH*(i+1);
    const cp=proj([c.lon,c.lat]);
    const cMo=filtMo(name);
    const stats=cityStats(name); if(!stats||!cMo.length) return;
    const sX=cp?cp[0]:gCX+gR*1.1, sY=cp?cp[1]:rowY;
    const midX=(sX+spX0)/2;
    ctx.beginPath(); ctx.moveTo(sX,sY);
    ctx.bezierCurveTo(midX+50,sY,midX-50,rowY,spX0,rowY);
    ctx.strokeStyle=ha(col,.35); ctx.lineWidth=1; ctx.stroke();
    if(cp){ctx.beginPath();ctx.arc(cp[0],cp[1],4.5,0,TAU);ctx.fillStyle=col;ctx.fill();}
    const rng=Math.max(stats.max-stats.min,.5);
    const spH=Math.min(rowH*.38,26);
    const xSc=(spW*.9)/Math.max(1,allMo.length-1);
    ctx.beginPath(); ctx.moveTo(spX0,rowY); ctx.lineTo(spX0+allMo.length*xSc,rowY);
    ctx.strokeStyle=ha(col,.1); ctx.lineWidth=.5; ctx.stroke();
    const mo=CO2_MONTHLY[name]||{};
    let started=false;
    ctx.beginPath();
    allMo.forEach((m,j)=>{
      const v=mo[m]; if(v===undefined) return;
      const sx=spX0+j*xSc;
      const sy=rowY-spH*(v-stats.min)/rng+spH*.5;
      if(!started){ctx.moveTo(sx,sy);started=true;}else{ctx.lineTo(sx,sy);}
    });
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.stroke();
    const lastMo=cMo[cMo.length-1];
    const lastJ=allMo.indexOf(lastMo);
    if(lastJ>=0&&mo[lastMo]!==undefined){
      const lSx=spX0+lastJ*xSc;
      const lSy=rowY-spH*(mo[lastMo]-stats.min)/rng+spH*.5;
      ctx.beginPath(); ctx.arc(lSx,lSy,4,0,TAU); ctx.fillStyle=col; ctx.fill();
    }
    ctx.font="bold 11px Segoe UI,sans-serif"; ctx.fillStyle=col;
    ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText(name,spX0,rowY-spH*.5-4);
    ctx.font="9px Segoe UI,sans-serif"; ctx.fillStyle=ha(col,.65);
    ctx.fillText(stats.avg.toFixed(2)+" ppm avg \u00b7 "+cMo.length+" months",spX0,rowY-spH*.5-14);
    if(i===0){
      ctx.fillStyle="#666"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
      const step=Math.max(1,Math.floor(allMo.length/6));
      allMo.forEach((m,j)=>{if(j%step===0||j===allMo.length-1) ctx.fillText(m,spX0+j*xSc,rowY+spH*.6+4);});
    }
  });
}

  if(!months.length){noDataMsg("No data in selected time range");return;}
  const M=months.length;
  const cellW=Math.max(9,Math.min(32,(W-labW-24)/M));
  const totW=cellW*M;

  // ── Range brush strip ──────────────────────────────────────────

  ctx.fillStyle="rgba(0,245,255,0.12)";
  ctx.beginPath(); ctx.roundRect(selX0,bY,selX1-selX0,bH,2); ctx.fill();
  ctx.strokeStyle="rgba(0,245,255,0.5)"; ctx.lineWidth=1;

  [selX0,selX1].forEach((hx,i)=>{
    ctx.fillStyle="#00f5ff";
    ctx.beginPath(); ctx.roundRect(hx-3,bY,6,bH,2); ctx.fill();
    ctx.fillStyle="#000"; ctx.font="bold 8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(i===0?S.yfrom:S.yto, hx+(i===0?-14:14), bY+bH/2);
  });
  // Label
  ctx.fillStyle="#555"; ctx.font="8px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("\u2194 drag to zoom range", bX, bY+bH+8+9);

  // Store brush geometry for hit test
  S._tlBrush={bX,bY,bW,bH,yr0,yr1,ySpan};

  // Year dividers + labels on the main plot
  const yBkt={};
  months.forEach((m,i)=>{const y=m.slice(0,4);if(!yBkt[y])yBkt[y]=[];yBkt[y].push(i);});
  ctx.save();
  ctx.fillStyle="#666"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
  Object.entries(yBkt).forEach(([yr,idxs])=>{
    const mi=(idxs[0]+idxs[idxs.length-1])/2;
    ctx.fillText(yr,startX+mi*cellW+cellW/2,topPad-14);
    if(idxs[0]>0){ctx.strokeStyle="#111";ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(startX+idxs[0]*cellW,topPad-2);ctx.lineTo(startX+idxs[0]*cellW,topPad+plotH-legH+12);ctx.stroke();}
  });
  S.sel.forEach((name,i)=>{
    const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
    const col=S.colors[name];
    const rowY=topPad+rowH*(i+.62);
    const mo=CO2_MONTHLY[name]||{};
    const stats=cityStats(name)||{min:410,max:425};
    const rng=Math.max(stats.max-stats.min,.5);
    ctx.font="bold 11px Segoe UI,sans-serif"; ctx.fillStyle=col;
    ctx.textAlign="right"; ctx.textBaseline="middle";
    ctx.fillText(name.length>15?name.slice(0,14)+"\u2026":name,labW-9,rowY);
    ctx.font="8px Segoe UI,sans-serif"; ctx.fillStyle="#888";
    ctx.fillText(c.country.split(" ").pop(),labW-9,rowY+13);
    months.forEach((m,j)=>{
      const val=mo[m];
      const cx2=startX+j*cellW+cellW/2;
      if(val===undefined){
        ctx.beginPath();ctx.arc(cx2,rowY,1.2,0,TAU);
        ctx.fillStyle="rgba(20,20,20,.5)";ctx.fill();return;
      }
      // Real SIF for that city-month; fallback to simulation
      const sifMo=SIF_MONTHLY[c.name];
      const sv=sifMo&&sifMo[m]!=null?sifMo[m]:_sifSim(c.lat,m);
      const sn=Math.max(0,Math.min(1,sv/.45));  // normalize 0–0.45 → 0–1
      const r=3+10*(val-stats.min)/rng;
      const a=.18+.76*sn;
      const grd=ctx.createRadialGradient(cx2,rowY,0,cx2,rowY,r*2);
      grd.addColorStop(0,ha(col,a*.45));grd.addColorStop(1,ha(col,0));
      ctx.beginPath();ctx.arc(cx2,rowY,r*2,0,TAU);ctx.fillStyle=grd;ctx.fill();
      ctx.beginPath();ctx.arc(cx2,rowY,r,0,TAU);ctx.fillStyle=ha(col,a);ctx.fill();
    });
  });
  ctx.fillStyle="#111"; ctx.fillRect(labW,H-legH,W-labW,legH);
  ctx.fillStyle="#aaa"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("CIRCLE SIZE = XCO\u2082 relative to city range   |   BRIGHTNESS = SIF (OCO-3, W/m\u00b2/sr/nm)",labW+14,H-legH+8);
  [.15,.5,1].forEach((f,k)=>{const r=3+10*f;const bx=labW+20+k*60;const by=H-legH+32;
    ctx.beginPath();ctx.arc(bx,by,r,0,TAU);ctx.strokeStyle="#888";ctx.lineWidth=1.2;ctx.stroke();
    ctx.fillStyle="#aaa";ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(f>.6?"high":f<.3?"low":"mid",bx,by+r+2);
  });
  ctx.restore();
  drawMinimap(.7);
}

// ── VIEW 4: Scatter ───────────────────────────────────────────────
function scatScale(vals, useLog, rangeMin, rangeMax){
  // Returns a function: value -> pixel coordinate (rangeMin..rangeMax maps to 0..1)
  const finite = vals.filter(v=>v!=null&&isFinite(v)&&(!useLog||v>0));
  if(!finite.length) return ()=>rangeMin;
  let lo = d3.min(finite), hi = d3.max(finite);
  if(useLog){ lo=Math.max(lo*.85,1e-9); hi=hi*1.15; }
  else { const pad=(hi-lo)*.07; lo-=pad; hi+=pad; }
  return v=>{
    if(v==null) return null;
    let t;
    if(useLog){ t=(Math.log(v)-Math.log(lo))/(Math.log(hi)-Math.log(lo)); }
    else { t=(v-lo)/(hi-lo); }
    return rangeMin+(rangeMax-rangeMin)*Math.max(0,Math.min(1,t));
  };
}
function niceLogTicks(lo, hi, n=6){
  const ticks=[];
  const logLo=Math.floor(Math.log10(lo)), logHi=Math.ceil(Math.log10(hi));
  for(let e=logLo;e<=logHi;e++){
    [1,2,5].forEach(m=>{
      const v=m*Math.pow(10,e);
      if(v>=lo*.9&&v<=hi*1.1) ticks.push(v);
    });
  }
  return ticks.slice(0,n+2);
}
function niceLinTicks(lo, hi, n=6){
  const step=Math.pow(10,Math.floor(Math.log10((hi-lo)/n)));
  const ticks=[];
  for(let v=Math.ceil(lo/step)*step; v<=hi*1.001; v+=step) ticks.push(parseFloat(v.toFixed(10)));
  return ticks;
}
function szColor(c, colKey, mo, colVals){
  const v=scatVal(c, colKey, mo);
  if(v==null) return 'rgba(60,60,70,0.5)';
  // SIF uses dedicated ecological ramp (brown→green)
  if(colKey==='sif') return sifColorAlpha(v, 0.82);
  // Other variables: blue→cyan→green→yellow→red (low→high)
  const mn=d3.min(colVals.filter(x=>x!=null)), mx=d3.max(colVals.filter(x=>x!=null));
  const t=(v-mn)/(mx-mn||1);
  const r=Math.round(t<.5?0:255*(t-.5)*2);
  const g=Math.round(t<.5?255*t*2:255*(1-(t-.5)*2));
  const b=Math.round(t<.5?255*(1-t*2):0);
  return `rgba(${r},${Math.max(g,30)},${Math.max(b,20)},0.75)`;
}
function drawV4(){
  ctx.clearRect(0,0,W,H);
  const {x:xk,y:yk,sz:szk,col:colk}=S.scat;
  const xDef=SCAT_VARS[xk], yDef=SCAT_VARS[yk];
  const ml=80,mr=22,mt=62,mb=52;
  const pw=W-ml-mr,ph=H-mt-mb;

  const cities=scatCities();
  if(!cities.length){noDataMsg("No data for selected axes in this time range.");return;}

  // Compute per-city values
  const cityEntries=cities.map(c=>{
    const mo=filtMo(c.name);
    return {c, mo, xv:scatVal(c,xk,mo), yv:scatVal(c,yk,mo), szv:scatVal(c,szk,mo), colv:scatVal(c,colk,mo)};
  }).filter(e=>e.xv!=null&&e.yv!=null);

  if(!cityEntries.length){noDataMsg("Not enough data for current settings.");return;}

  const xVals=cityEntries.map(e=>e.xv), yVals=cityEntries.map(e=>e.yv);
  const szVals=cityEntries.map(e=>e.szv).filter(v=>v!=null);
  const colVals=cityEntries.map(e=>e.colv);
  const maxSz=d3.max(szVals)||1;

  const xPx=scatScale(xVals,xDef.log,ml,ml+pw);
  // Y is inverted (high value = top)
  const yPx_fwd=scatScale(yVals,yDef.log,mt,mt+ph);
  const yPx=v=>{ const p=yPx_fwd(v); return p==null?null: mt+ph-(p-mt); };

  ctx.save();

  // Draw grid lines subtle
  ctx.strokeStyle="#111"; ctx.lineWidth=.5; ctx.setLineDash([3,6]);
  // vertical grid
  const xFinite=xVals.filter(v=>v>0||!xDef.log);
  const xLo=d3.min(xFinite)*.85, xHi=d3.max(xFinite)*1.15;
  const xTicks=xDef.log?niceLogTicks(xLo,xHi):niceLinTicks(d3.min(xFinite),d3.max(xFinite));
  xTicks.forEach(v=>{const px=xPx(v);if(px>ml&&px<ml+pw){ctx.beginPath();ctx.moveTo(px,mt);ctx.lineTo(px,mt+ph);ctx.stroke();}});
  const yFinite=yVals.filter(v=>v>0||!yDef.log);
  const yLo=d3.min(yFinite)*.85, yHi=d3.max(yFinite)*1.15;
  const yTicks=yDef.log?niceLogTicks(yLo,yHi):niceLinTicks(d3.min(yFinite),d3.max(yFinite));
  yTicks.forEach(v=>{const py=yPx(v);if(py>mt&&py<mt+ph){ctx.beginPath();ctx.moveTo(ml,py);ctx.lineTo(ml+pw,py);ctx.stroke();}});
  ctx.setLineDash([]);

  // Axes
  ctx.strokeStyle="#282828"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ml,mt); ctx.lineTo(ml,mt+ph); ctx.lineTo(ml+pw,mt+ph); ctx.stroke();

  // Tick labels X
  ctx.fillStyle="#999"; ctx.font="9px Segoe UI,sans-serif";
  xTicks.forEach(v=>{
    const px=xPx(v); if(px<=ml||px>ml+pw) return;
    ctx.beginPath();ctx.moveTo(px,mt+ph);ctx.lineTo(px,mt+ph+3);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="top";
    const lbl=xDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':xDef.fmt(v);
    ctx.fillText(lbl,px,mt+ph+5);
  });
  // Tick labels Y
  yTicks.forEach(v=>{
    const py=yPx(v); if(py<=mt||py>mt+ph) return;
    ctx.beginPath();ctx.moveTo(ml-3,py);ctx.lineTo(ml,py);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="right"; ctx.textBaseline="middle";
    const lbl=yDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':yDef.fmt(v);
    ctx.fillText(lbl,ml-5,py);
  });

  // Axis labels
  ctx.fillStyle="#aaa"; ctx.font="10px Segoe UI,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText(xDef.label+(xDef.log?' [log]':''),ml+pw/2,mt+ph+22);
  ctx.save(); ctx.translate(14,mt+ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle="#aaa"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(yDef.label+(yDef.log?' [log]':''),0,0);
  ctx.restore();

  // Draw unselected cities first
  for(const {c,mo,xv,yv,szv,colv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(isSel||isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?5:(szv!=null?3+10*Math.sqrt(Math.max(0,szv/maxSz)):4);
    const col=szColor(c,colk,mo,colVals);
    ctx.beginPath(); ctx.arc(px,py,r,0,TAU);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle="rgba(120,120,140,0.22)"; ctx.lineWidth=.6; ctx.stroke();
  }
  // Draw selected/hovered on top
  for(const {c,mo,xv,yv,szv,colv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(!isSel&&!isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?6:(szv!=null?4+12*Math.sqrt(Math.max(0,szv/maxSz)):5);
    const col=S.colors[c.name]||"#fff";
    const grd=ctx.createRadialGradient(px,py,0,px,py,r*2.2);
    grd.addColorStop(0,ha(col,.22)); grd.addColorStop(1,ha(col,0));
    ctx.beginPath(); ctx.arc(px,py,r*2.2,0,TAU); ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath(); ctx.arc(px,py,r,0,TAU);
    ctx.fillStyle=ha(col,.35); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=isSel?2:1.2; ctx.stroke();
    ctx.font="bold 10px Segoe UI,sans-serif";
    ctx.fillStyle=col; ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText(c.name,px+r+3,py);
  }

  // Legend: size
  const lx=ml+pw+mr-6, ly=mt+4;
  if(szk!=='uniform'){
    const szDef=SCAT_VARS[szk];
    ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="top";
    ctx.fillText(szDef.short,lx,ly);
    [.2,.5,1].forEach((f,i)=>{
      const r=3+10*Math.sqrt(f);
      const cy=ly+14+i*28+r;
      ctx.beginPath(); ctx.arc(lx-r-2,cy,r,0,TAU);
      ctx.fillStyle="rgba(80,80,90,0.4)"; ctx.fill();
      ctx.strokeStyle="#444"; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle="#888"; ctx.textAlign="right"; ctx.textBaseline="middle";
      const sv=f*maxSz;
      const lbl=szDef.log&&sv>=1000?sv>=1e6?(sv/1e6).toFixed(0)+'M':(sv/1000).toFixed(0)+'k':szDef.fmt(sv);
      ctx.fillText(lbl,lx-r*2-6,cy);
    });
  }
  // Legend: color bar
  {
    const colDef=SCAT_VARS[colk];
    const barH=80, barW=10;
    const barY=szk==='uniform'?ly+6:ly+110;
    ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="top";
    ctx.fillText(colDef.short,lx,barY);
    const colValsF=colVals.filter(v=>v!=null);
    const cMin=colValsF.length?d3.min(colValsF):0;
    const cMax=colValsF.length?d3.max(colValsF):1;
    for(let i=0;i<barH;i++){
      const t=(barH-1-i)/barH; // top=high, bottom=low
      let colStr;
      if(colk==='sif'){
        colStr=sifColor(t*0.45);
      } else {
        const r=Math.round(t<.5?0:255*(t-.5)*2);
        const g=Math.round(t<.5?255*t*2:255*(1-(t-.5)*2));
        const b=Math.round(t<.5?255*(1-t*2):0);
        colStr=`rgba(${r},${Math.max(g,30)},${Math.max(b,20)},0.85)`;
      }
      ctx.fillStyle=colStr;
      ctx.fillRect(lx-barW,barY+12+i,barW,1);
    }
    ctx.strokeStyle="#333"; ctx.lineWidth=.5;
    ctx.strokeRect(lx-barW,barY+12,barW,barH);
    if(colValsF.length){
      const fmtC=v=>colDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':colDef.fmt(v);
      ctx.fillStyle="#999"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
      ctx.fillText(fmtC(cMax),lx-barW-3,barY+14);
      ctx.fillText(fmtC(cMin),lx-barW-3,barY+10+barH);
    }
  }

  // Info footer
  const needsAhn=AHN_VARS.has(xk)||AHN_VARS.has(yk)||AHN_VARS.has(szk);
  ctx.fillStyle="#666"; ctx.font="8.5px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  const src=needsAhn?"OCO-3 SAM + Ahn et al. 2025":"OCO-3 SAM";
  ctx.fillText(`${cityEntries.length} cities · ${src} · SIF: real OCO-3 data`,ml,8);

  ctx.restore();
  drawMinimap(.7);
}

function noDataMsg(msg){
  ctx.fillStyle="#666"; ctx.font="13px Segoe UI,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(msg,W/2,H/2);
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  if(!W||!H) return;
  switch(S.view){
    case 0:drawV0();break; case 1:drawV1();break; case 2:drawV2();break;
    case 3:drawV3();break; case 4:drawV4();break;
  }
  updateOverlays();
}

// ── AUTO-ROTATE ───────────────────────────────────────────────────
function animTick(){
  if(S.view<=1&&!S.drag.on&&Date.now()-lastDrag>2800){
    S.rot.lon=(S.rot.lon+.055)%360;
    render();
  }
  requestAnimationFrame(animTick);
}

// ── TOOLTIP ───────────────────────────────────────────────────────
const tt=document.getElementById("tt");
function showTT(c,ex,ey){
  const stats=cityStats(c.name);
  const sv=getSIF(c.name, stats?.months);
  const hasSifData=SIF_MONTHLY[c.name]!=null;
  document.getElementById("tt-name").textContent=c.name+", "+c.country.split(" ").slice(-1)[0];
  const tb=document.getElementById("tt-body");
  const rows=[];
  rows.push(`<div class="tt-row">XCO\u2082 avg: <b>${stats?stats.avg.toFixed(2)+" ppm":"no data in range"}</b></div>`);
  rows.push(`<div class="tt-row">SIF (OCO-3${hasSifData?"":", simul."}): <b>${sv.toFixed(3)} W/m\u00b2/sr/nm</b></div>`);
  if(c.co2!=null) rows.push(`<div class="tt-row">CO\u2082 emissions: <b>${c.co2} MtCO\u2082/yr</b></div>`);
  if(c.pop!=null) rows.push(`<div class="tt-row">Population: <b>${(c.pop/1e6).toFixed(1)}M</b></div>`);
  if(c.gdp!=null) rows.push(`<div class="tt-row">GDP: <b>$${c.gdp}B</b></div>`);
  if(c.co2!=null&&c.gdp!=null) rows.push(`<div class="tt-row">CO\u2082/GDP: <b>${(c.co2/c.gdp).toFixed(4)} kg/USD</b></div>`);
  tb.innerHTML=rows.join('');
  const stage=document.getElementById("stage");
  const sr=stage.getBoundingClientRect();
  const tx=Math.min(ex-sr.left+14,W-210);
  const ty=Math.max(ey-sr.top-80,10);
  tt.style.left=tx+"px"; tt.style.top=ty+"px"; tt.style.display="block";
}
function hideTT(){tt.style.display="none";}

// ── OVERLAYS ─────────────────────────────────────────────────────
function updateOverlays(){
  const vh=document.getElementById("vhdr");
  vh.innerHTML=`<h2>${VIEWS[S.view]}</h2><p>${VHINTS[S.view]}</p>`;
  const gt=document.getElementById("gtog");
  gt.style.display=(S.view<=1)?"block":"none";
  gt.textContent=S.flat?"\u2299 3D Globe":"\u26F6 2D Map";
  gt.classList.toggle("flat",S.flat);
  cv.style.cursor=(S.view<=1)?"grab":"default";
  document.getElementById("plink").style.display=(S.view===2)?"flex":"none";
  const sc=document.getElementById("scat-ctrl");
  if(sc) sc.classList.toggle("on",S.view===4);
  // hide vhdr when scatter controls are shown (they overlap)
  if(vh) vh.style.display=(S.view===4)?"none":"block";
  document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("on",i===S.view));
  document.querySelectorAll(".vb").forEach(b=>b.classList.toggle("on",+b.dataset.v===S.view));
}

// ── CANVAS HIT TEST ───────────────────────────────────────────────
function getProj(){
  if(S.view===0||S.view===1){
    const sc=Math.min(W,H)*.4;
    return S.flat?mkFlat(W/2,H/2,W/6.6):mkGlobe(W/2,H/2,sc);
  }
  if(S.view===2){
    const gR=Math.min(W*.17,H*.3);
    const sc2=S.sel.map(nm=>CITY_DATA.find(c=>c.name===nm)).filter(Boolean);
    const cLon=sc2.length?sc2.reduce((s,c)=>s+c.lon,0)/sc2.length:0;
    const cLat=sc2.length?sc2.reduce((s,c)=>s+c.lat,0)/sc2.length:0;
    return mkGlobe(W*.2,H*.5,gR,cLon,cLat);
  }
  return null;
}
function hitTest(ex,ey){
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left, my=ey-rect.top;
  if(S.view===4){
    const {x:xk,y:yk,sz:szk}=S.scat;
    const xDef=SCAT_VARS[xk], yDef=SCAT_VARS[yk];
    const ml=80,mr=22,mt=62,mb=52;
    const pw=W-ml-mr, ph=H-mt-mb;
    const cities=scatCities();
    const entries=cities.map(c=>{
      const mo=filtMo(c.name);
      return{c,mo,xv:scatVal(c,xk,mo),yv:scatVal(c,yk,mo),szv:scatVal(c,szk,mo)};
    }).filter(e=>e.xv!=null&&e.yv!=null);
    if(!entries.length) return null;
    const xVals=entries.map(e=>e.xv), yVals=entries.map(e=>e.yv);
    const szVals=entries.map(e=>e.szv).filter(v=>v!=null);
    const maxSz=d3.max(szVals)||1;
    const xPx=scatScale(xVals,xDef.log,ml,ml+pw);
    const yPx_fwd=scatScale(yVals,yDef.log,mt,mt+ph);
    const yPx=v=>{const p=yPx_fwd(v);return p==null?null:mt+ph-(p-mt);};
    let near=null,nearD=18;
    for(const {c,xv,yv,szv} of entries){
      const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
      const r=szk==='uniform'?5:(szv!=null?3+10*Math.sqrt(Math.max(0,szv/maxSz)):4);
      const d=Math.hypot(mx-px,my-py);
      if(d<r+8&&d<nearD){near=c;nearD=d;}
    }
    return near;
  }
  const proj=getProj(); if(!proj) return null;
  let near=null,nearD=14;
  for(const c of CITY_DATA){
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const d=Math.hypot(mx-p[0],my-p[1]);
    if(d<nearD){near=c;nearD=d;}
  }
  return near;
}
// ── Helper: is mouse over timeline brush strip? ───────────────────
function tlBrushHit(ex,ey){
  if(S.view!==3||!S._tlBrush) return null;
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left, my=ey-rect.top;
  const {bX,bY,bW,bH,yr0,yr1,ySpan}=S._tlBrush;
  if(my<bY-4||my>bY+bH+4) return null;
  if(mx<bX-8||mx>bX+bW+8) return null;
  // Determine what's being hit: left handle, right handle, or track
  const selX0=bX+(S.yfrom-yr0)/ySpan*bW;
  const selX1=bX+(S.yto+1-yr0)/ySpan*bW;
  if(Math.abs(mx-selX0)<8) return 'from';
  if(Math.abs(mx-selX1)<8) return 'to';
  if(mx>=selX0&&mx<=selX1) return 'pan';
  return 'from'; // clicking outside range starts new selection from that end
}

let mdownPos=null;
cv.addEventListener("mousedown",e=>{
  // Month scrubber takes top priority in V0/V1
  if(scrubberHit(e.clientX,e.clientY)){
    SCR.drag=true; scrubToX(e.clientX); cv.style.cursor='ew-resize'; return;
  }
  // Timeline brush takes priority over globe drag
  const tlHit=tlBrushHit(e.clientX,e.clientY);
  if(tlHit){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    TL.drag={mode:tlHit, x0:mx, from0:S.yfrom, to0:S.yto};
    cv.style.cursor='ew-resize';
    return;
  }
  if(S.view>1) return;
  lastDrag=Date.now();
  mdownPos={x:e.clientX,y:e.clientY};
  S.drag={on:true,x0:e.clientX,y0:e.clientY,lon0:S.rot.lon,lat0:S.rot.lat};
});
window.addEventListener("mousemove",e=>{
  // Month scrubber drag
  if(SCR.drag){
    scrubToX(e.clientX);
    cv.style.cursor='ew-resize'; return;
  }
  // Timeline brush drag
  if(TL.drag){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const {bX,bW,yr0,yr1,ySpan}=S._tlBrush||{};
    if(bW){
      const dx=mx-TL.drag.x0;
      const dyrs=Math.round(dx/bW*ySpan);
      if(TL.drag.mode==='from'){
        setYearRange(TL.drag.from0+dyrs, TL.drag.to0);
      } else if(TL.drag.mode==='to'){
        setYearRange(TL.drag.from0, TL.drag.to0+dyrs);
      } else { // pan
        setYearRange(TL.drag.from0+dyrs, TL.drag.to0+dyrs);
      }
    }
    return;
  }
  if(S.drag.on){
    const dx=e.clientX-S.drag.x0,dy=e.clientY-S.drag.y0;
    S.rot.lon=S.drag.lon0+dx*.26;
    S.rot.lat=Math.max(-88,Math.min(88,S.drag.lat0-dy*.26));
    lastDrag=Date.now();
    render(); return;
  }
  // Cursor hints for scrubber / timeline brush
  if(S.view<=1){
    cv.style.cursor=scrubberHit(e.clientX,e.clientY)?'ew-resize':'grab';
  } else if(S.view===3){
    const hit=tlBrushHit(e.clientX,e.clientY);
    cv.style.cursor=hit?'ew-resize':'default';
  }
  const c=hitTest(e.clientX,e.clientY);
  if(c!==S.hover||(c&&c.name!==S.hover?.name)){
    S.hover=c||null;
    if(c){showTT(c,e.clientX,e.clientY);if(S.view!==3)cv.style.cursor="pointer";}
    else{hideTT();if(S.view<=1)cv.style.cursor="grab";}
    if(S.view===0||S.view===1||S.view===4) render();
  } else if(c) showTT(c,e.clientX,e.clientY);
});
window.addEventListener("mouseup",e=>{
  if(SCR.drag){SCR.drag=false;cv.style.cursor='default';return;}
  if(TL.drag){TL.drag=null;cv.style.cursor='default';return;}
  if(!S.drag.on){
    if(S.view>1){const c=hitTest(e.clientX,e.clientY);if(c) toggleCity(c.name);}
    S.drag={on:false}; return;
  }
  const moved=mdownPos?Math.hypot(e.clientX-mdownPos.x,e.clientY-mdownPos.y):99;
  S.drag={on:false};
  if(moved<6){const c=hitTest(e.clientX,e.clientY);if(c) toggleCity(c.name);}
});
cv.addEventListener("mouseleave",()=>{hideTT();S.hover=null;if(TL.drag)TL.drag=null;SCR.drag=false;S._v2cross=null;});
cv.addEventListener("dblclick",e=>{
  if(tlBrushHit(e.clientX,e.clientY)){
    setYearRange(YEARS[0],YEARS[YEARS.length-1]);
  }
});

// ── CITY MANAGEMENT ───────────────────────────────────────────────
function toggleCity(name){
  if(S.sel.includes(name)) removeCity(name); else addCity(name);
}
function addCity(name){
  if(S.sel.includes(name)) return;
  S.sel.push(name); S.colors[name]=PAL[S.sel.length-1];
  rebuildChips(); updateMonthsHint();
}
function removeCity(name){
  S.sel=S.sel.filter(n=>n!==name); delete S.colors[name];
  S.sel.forEach((n,i)=>{S.colors[n]=PAL[i];});
  rebuildChips(); updateMonthsHint();
}
function rebuildChips(){
  const el=document.getElementById("chips"); el.innerHTML="";
  S.sel.forEach(name=>{
    const col=S.colors[name];
    const div=document.createElement("div");
    div.className="chip"; div.style.color=col; div.style.borderColor=col+"44";
    div.innerHTML=`<div style="width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0"></div>`+
      `<span>${name.length>13?name.slice(0,12)+"\u2026":name}</span>`+
      `<span class="chip-x" data-n="${name}">\u00d7</span>`;
    div.querySelector(".chip-x").addEventListener("click",e=>{e.stopPropagation();removeCity(name);render();});
    el.appendChild(div);
  });
  // Update count badge
  const cnt=document.getElementById("sel-count");
  if(cnt) cnt.textContent=S.sel.length?`${S.sel.length} selected`:``;
  buildCityList(document.getElementById("srch").value);
  render();
}
function buildCityList(q=""){
  const el=document.getElementById("city-list"); if(!el) return;
  const lq=q.toLowerCase();
  const list=CITY_DATA.filter(c=>!lq||c.name.toLowerCase().includes(lq)||c.country.toLowerCase().includes(lq));
  if(!list.length){el.innerHTML=`<div class="city-list-empty">No cities match</div>`;return;}
  // Sort: selected first, then Ahn-enriched (have co2 data), then alphabetical
  list.sort((a,b)=>{
    const as=S.sel.includes(a.name),bs=S.sel.includes(b.name);
    if(as&&!bs) return -1; if(bs&&!as) return 1;
    if(a.co2!=null&&b.co2==null) return -1; if(b.co2!=null&&a.co2==null) return 1;
    return a.name.localeCompare(b.name);
  });
  el.innerHTML="";
  list.forEach(c=>{
    const isSel=S.sel.includes(c.name);
    const col=S.colors[c.name]||null;
    const div=document.createElement("div");
    div.className="city-item"+(isSel?" sel":"");
    // Badge: show CO2 emissions for Ahn cities, or "OCO" for CSV-only
    const badge=c.co2!=null
      ?`<div class="ci-co2">${c.co2.toFixed(0)}</div>`
      :`<div class="ci-co2" style="color:#2a3a3a;font-size:8px">OCO</div>`;
    div.innerHTML=
      `<div class="ci-dot" style="${isSel?`background:${col};border-color:${col};box-shadow:0 0 4px ${col}44`:``}"></div>`+
      `<div class="ci-text">`+
        `<div class="ci-name" style="${isSel?`color:${col}`:``}">${c.name}</div>`+
        `<div class="ci-country">${c.country.replace("Kingdom of ","").replace("French Republic","France")}</div>`+
      `</div>`+badge;
    div.addEventListener("click",()=>{toggleCity(c.name);});
    el.appendChild(div);
  });
}

// ── CITY SEARCH FILTER ────────────────────────────────────────────
const srch=document.getElementById("srch");
srch.addEventListener("input",()=>buildCityList(srch.value));

// ── TIME RANGE ────────────────────────────────────────────────────
function buildYearSelects(){
  const fy=document.getElementById("yfrom"), ty=document.getElementById("yto");
  YEARS.forEach(y=>{
    const of=document.createElement("option"),ot=document.createElement("option");
    of.value=ot.value=y; of.textContent=ot.textContent=y;
    fy.appendChild(of); ty.appendChild(ot);
  });
  fy.value=S.yfrom; ty.value=S.yto;
  fy.addEventListener("change",()=>{
    S.yfrom=+fy.value;
    if(S.yto<S.yfrom){S.yto=S.yfrom;ty.value=S.yto;}
    updateMonthsHint(); render();
  });
  ty.addEventListener("change",()=>{
    S.yto=+ty.value;
    if(S.yfrom>S.yto){S.yfrom=S.yto;fy.value=S.yfrom;}
    updateMonthsHint(); render();
  });
}

// ── VIEW NAV ──────────────────────────────────────────────────────
function setView(v){
  v=Math.max(0,Math.min(4,v));
  if(v===S.view) return;
  cv.classList.add("fade");
  S.view=v; hideTT(); S.hover=null;
  setTimeout(()=>{cv.classList.remove("fade");render();},100);
}
document.getElementById("np").addEventListener("click",()=>setView(S.view-1));
document.getElementById("nn").addEventListener("click",()=>setView(S.view+1));
document.getElementById("gtog").addEventListener("click",()=>{S.flat=!S.flat;render();});

// Scatter axis controls
['sc-x','sc-y','sc-sz','sc-col'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  const key=id.replace('sc-','');
  const stateKey={x:'x',y:'y',sz:'sz',col:'col'}[key];
  el.value=S.scat[stateKey];
  el.addEventListener('change',()=>{S.scat[stateKey]=el.value;render();});
});
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")setView(S.view+1);
  if(e.key==="ArrowLeft")setView(S.view-1);
});

function buildDots(){
  const el=document.getElementById("dots"); el.innerHTML="";
  for(let i=0;i<5;i++){
    const d=document.createElement("div");
    d.className="dot"+(i===0?" on":""); d.title=VIEWS[i];
    d.addEventListener("click",()=>setView(i)); el.appendChild(d);
  }
}
function buildVGrid(){
  const el=document.getElementById("vgrid"); el.innerHTML="";
  VIEWS.forEach((nm,i)=>{
    const b=document.createElement("button");
    b.className="vb"+(i===0?" on":""); b.dataset.v=i; b.textContent=nm;
    b.addEventListener("click",()=>setView(i)); el.appendChild(b);
  });
}

// ── INIT ──────────────────────────────────────────────────────────
DEFAULT_SEL.forEach(n=>addCity(n));
buildDots(); buildVGrid(); buildYearSelects();
buildCityList();
updateMonthsHint();
resize();
window.addEventListener("resize",resize);
requestAnimationFrame(animTick);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json")
  .then(topo=>{
    land=topojson.feature(topo,topo.objects.land);
    document.getElementById("ldg").style.display="none";
    render();
  })
  .catch(()=>{document.getElementById("ldg").style.display="none";render();});
</script>
